fragment AniListAnimeInfo on Media {
    id,
    title {
        english,
        native,
        romaji
    },
    coverImage {
        large,
        medium
    }
    bannerImage,
    status,
    description,
    episodes,
    popularity,
    favourites,
    genres,
    meanScore,
    format,
    mediaListEntry {
        status,
        progress,
        score(format: POINT_10)
    },
    studios(isMain: true){
        nodes {
            id, name
        }
    },
    trailer {
        id, site, thumbnail
    },
    stats {
        statusDistribution {
            status, amount
        }
    },
    relations {
        edges {
            relationType,
            node {
                id, title {
                    romaji, english
                },
                coverImage {
                    medium
                },
                episodes,
                status,
                meanScore,
                format
            }
        }
    }
}